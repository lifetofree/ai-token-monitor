name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Syntax check (server + app + lib)
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: sqlite3 availability probe
        run: sqlite3 --version

      - name: Server boot + endpoint smoke
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:3838/ > /dev/null
          curl -sf http://localhost:3838/api/seed-quotas > /dev/null
          kill $SERVER_PID
