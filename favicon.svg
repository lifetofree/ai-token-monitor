<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#3b82f6"/>
  <!-- Bar chart: 3 rising bars -->
  <rect x="5"  y="19" width="6" height="8" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="13" y="13" width="6" height="14" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="21" y="7"  width="6" height="20" rx="1.5" fill="white"/>
  <!-- Gold accent dot on tallest bar — the "token" -->
  <circle cx="24" cy="5.5" r="2.5" fill="#fbbf24"/>
</svg>
